function loadStr(k){try{return localStorage.getItem(k)||"";}catch{return "";}}

function cle(nom,date){return nom+"__"+date;}
function getP(data,nom,date){return data[cle(nom,date)]||{entree:null,sortie:null};}
function nextBadge(p){if(!p.entree)return"entree";if(!p.sortie)return"sortie";return null;}

function loadQueue(){return load("sync_queue",[]);}
function saveQueue(q){save("sync_queue",q);}
function pushQueue(item){
  const q=loadQueue();
  const idx=q.findIndex(i=>i.nom===item.nom&&i.date===item.date);
  if(idx>=0)q[idx]=item;else q.push(item);
  saveQueue(q);
}

async function sendItem(item,url){
  const d=new Date(item.date+"T12:00:00");
  await fetch(url,{
    method:"POST",mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({lignes:[{
      date:d.toLocaleDateString("fr-FR"),
      mois:d.toLocaleDateString("fr-FR",{month:"long",year:"numeric"}),
      nom:item.nom,entree:item.entree||"",sortie:item.sortie||""
    }]})
  });
}

// ── Flash ──
function Flash({nom,type,heure,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2500);return()=>clearTimeout(t);},[]);
  const e=type==="entree";
  return React.createElement("div",{style:{position:"fixed",inset:0,zIndex:999,background:e?"rgba(22,163,74,0.97)":"rgba(220,38,38,0.97)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#fff"}},
    React.createElement("div",{style:{fontSize:100,lineHeight:1}},e?"🟢":"🔴"),
    React.createElement("div",{style:{fontSize:36,fontWeight:800,marginTop:20}},nom),
    React.createElement("div",{style:{fontSize:26,marginTop:10,opacity:.9}},e?"Entrée enregistrée":"Sortie enregistrée"),
    React.createElement("div",{style:{fontSize:48,fontWeight:900,marginTop:14}},heure)
  );
}

// ── Sync indicator ──
function SyncDot({queueSize,syncing}){
  if(queueSize===0&&!syncing)return null;
  return React.createElement("div",{style:{position:"fixed",bottom:16,right:16,zIndex:100,background:syncing?"#0369a1":"#92400e",color:"#fff",borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:6,boxShadow:"0 2px 8px #0006"}},
    syncing?"⏳ Sync...":"📤 "+queueSize+" en attente"
  );
}

// ── Badgeuse ──
function Badgeuse({salaries,data,queueSize,syncing,onBadge,onAdmin}){
  const [h,setH]=useState(heure());
  const [ds,setDs]=useState(fmtDate(n()));
  const [confirm,setConfirm]=useState(null);
  useEffect(()=>{const t=setInterval(()=>{setH(heure());setDs(fmtDate(n()));},10000);return()=>clearInterval(t);},[]);
  const td=today();
  const handleClick=nom=>{const p=getP(data,nom,td);const nx=nextBadge(p);if(!nx)return;setConfirm({nom,type:nx,heure:heure()});};
  const handleOk=()=>{if(!confirm)return;onBadge(confirm.nom,confirm.type,confirm.heure);setConfirm(null);};

  return React.createElement("div",{style:{minHeight:"100vh",background:"#0f172a",color:"#fff",display:"flex",flexDirection:"column"}},
    // Header
    React.createElement("div",{style:{background:"#1e293b",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 12px #0009"}},
      React.createElement("img",{src:LOGO_BASE64,alt:"Emmaüs",style:{height:64,objectFit:"contain"}}),
      React.createElement("div",{style:{textAlign:"center",flex:1}},
        React.createElement("div",{style:{fontSize:14,color:"#94a3b8",textTransform:"capitalize",marginBottom:2}},ds),
        React.createElement("div",{style:{fontSize:52,fontWeight:900,lineHeight:1,color:"#38bdf8",letterSpacing:2}},h)
      ),
      React.createElement("button",{onClick:onAdmin,style:{background:"#1e3a5f",border:"none",color:"#94a3b8",padding:"10px 16px",borderRadius:10,cursor:"pointer",fontSize:13,minWidth:80}},"⚙️ Admin")
    ),
    React.createElement("div",{style:{textAlign:"center",padding:"10px 0 6px",color:"#475569",fontSize:14,letterSpacing:1}},"SÉLECTIONNEZ VOTRE NOM"),
    // Grille
    React.createElement("div",{style:{flex:1,padding:"8px 20px 20px",overflowY:"auto",display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(150px, 1fr))",gap:10,alignContent:"start"}},
      salaries.map(nom=>{
        const p=getP(data,nom,td);const nx=nextBadge(p);const done=nx===null;
        let bc="#334155",bg="#1e293b",ic="#1e40af";
        if(done){bg="#0f2a1a";bc="#166534";ic="#166534";}

          React.createElement("div",{style:{width:46,height:46,borderRadius:"50%",background:ic,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800}},nom.charAt(0)),
          React.createElement("div",{style:{fontSize:13,fontWeight:600,lineHeight:1.3,textAlign:"center"}},nom)
        );
      })
    ),
    React.createElement(SyncDot,{queueSize,syncing}),
    confirm&&React.createElement(Modal,{nom:confirm.nom,type:confirm.type,heure:confirm.heure,onOk:handleOk,onCancel:()=>setConfirm(null)})
  );
}

// ── App ──
function App(){
  const [data,setData]=useState(()=>load("pointages_v3",{}));
  const [salaries,setSalaries]=useState(()=>load("salaries_v3",SALARIES_DEFAUT));
  const [ecran,setEcran]=useState("badgeuse");
  const [flash,setFlash]=useState(null);
  const [queueSize,setQueueSize]=useState(()=>loadQueue().length);
  const [syncing,setSyncing]=useState(false);
  const syncRef=useRef(false);

  const processQueue=useCallback(async()=>{
    if(syncRef.current)return;
    const url=loadStr("webhook_url");
    if(!url)return;
    const q=loadQueue();
    if(q.length===0)return;
    syncRef.current=true;setSyncing(true);
    const rest=[];
    for(const item of q){try{await sendItem(item,url);}catch{rest.push(item);}}
    saveQueue(rest);setQueueSize(rest.length);
    syncRef.current=false;setSyncing(false);
  },[]);

  useEffect(()=>{
    window.addEventListener("online",processQueue);
    return()=>window.removeEventListener("online",processQueue);
  },[processQueue]);

  useEffect(()=>{
    const t=setInterval(()=>{if(loadQueue().length>0&&navigator.onLine)processQueue();},30000);
    return()=>clearInterval(t);
  },[processQueue]);

  const badge=useCallback((nom,type,h)=>{
    const td=today();
    const p=getP(data,nom,td);
    const newP={...p,[type]:h};
    const newData={...data,[cle(nom,td)]:newP};
    setData(newData);save("pointages_v3",newData);
    setFlash({nom,type,heure:h});
    pushQueue({nom,date:td,entree:newP.entree,sortie:newP.sortie});
    setQueueSize(loadQueue().length);
    processQueue();
  },[data,processQueue]);

  return React.createElement(React.Fragment,null,
    flash&&React.createElement(Flash,{nom:flash.nom,type:flash.type,heure:flash.heure,onDone:()=>setFlash(null)}),
    ecran==="badgeuse"
      ?React.createElement(Badgeuse,{salaries,data,queueSize,syncing,onBadge:badge,onAdmin:()=>setEcran("admin")})
      :React.createElement(Admin,{data,salaries,queueSize,syncing,onRetour:()=>setEcran("badgeuse"),onUpdateSalaries:l=>{setSalaries(l);save("salaries_v3",l);},onEffacer:()=>{setData({});save("pointages_v3",{});saveQueue([]);setQueueSize(0);},onForceSync:processQueue})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
